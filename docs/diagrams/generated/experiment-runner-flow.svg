acking (suite plan / run / status / cancel).</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="198.4533" x="335.6687" y="102.3079"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="178.4533" x="345.6687" y="125.136">Parse CLI or dashboard request</text><rect fill="#F8F8F8" height="85.3765" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="254.6736" x="307.5586" y="180.892"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="91.0686" x="317.5586" y="203.7201">Build RunConfig</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="133.669" x="317.5586" y="220.0642">(system, corpus, model,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="171.7932" x="317.5586" y="236.4083">automation level, corpus path,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="234.6736" x="317.5586" y="252.7524">reasoning_enabled, num_ctx, store_trace)</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="120.4047" x="374.693" y="286.2684"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="100.4047" x="384.693" y="309.0965">Load question file</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="120.4047" x="374.693" y="392.1035"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="100.4047" x="384.693" y="414.9316">Filter question list</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="161.193" x="354.2989" y="497.9386"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="141.193" x="364.2989" y="520.7666">Rai