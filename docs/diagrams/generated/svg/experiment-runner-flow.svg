<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2899px" preserveAspectRatio="none" style="width:909px;height:2899px;background:#FFFFFF;" version="1.1" viewBox="0 0 909 2899" width="909px" zoomAndPan="magnify"><title>Experiment Runner - Batch Execution Flow</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="296.9108" x="304.8232" y="34.9659">Experiment Runner - Batch Execution Flow</text></g><ellipse cx="435.5997" cy="60.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="198.4533" x="336.373" y="90.0679"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="178.4533" x="346.373" y="112.896">Parse CLI or dashboard request</text><path d="M10,136.412 L10,217.2361 L340.5173,217.2361 L340.5173,146.412 L330.5173,136.412 L10,136.412" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M330.5173,136.412 L330.5173,146.412 L340.5173,146.412 L330.5173,136.412" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="105.2871" x="16" y="155.309">Alternative entry:</text><text fill="#000000" font-family="Arial" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="149.7991" x="124.6671" y="155.309">suite run --config &lt;file&gt;</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="309.5173" x="16" y="173.0151">expands a YAML config into multiple single-system</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="282.8932" x="16" y="190.7211">tasks and executes them with resumable state</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="256.1653" x="16" y="208.4271">tracking (suite plan / run / status / cancel).</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="201.7293" x="334.735" y="266.727"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="181.7293" x="344.735" y="289.5551">Load base suite config and state</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="235.4495" x="317.8749" y="323.0712"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="164.7372" x="327.8749" y="345.8992">Create copied editable config</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="215.4495" x="327.8749" y="362.2434">with new suite_id and -augment name</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="237.8736" x="316.6629" y="395.7594"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="217.8736" x="326.6629" y="418.5875">Build planned tasks from edited config</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="287.9139" x="291.6427" y="452.1035"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="218.2935" x="301.6427" y="474.9316">Carry over matching SUCCEEDED tasks</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="267.9139" x="301.6427" y="491.2757">only when result JSONL exists and is non-empty</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="197.0612" x="337.0691" y="524.7917"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="177.0612" x="347.0691" y="547.6198">Mark failed, cancelled, running,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="152.8091" x="347.0691" y="563.9639">and new tasks as PENDING</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="189.4412" x="340.8791" y="597.48"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="167.9532" x="350.8791" y="620.308">Persist augmented suite state</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="169.4412" x="350.8791" y="636.6522">with provenance to base state</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="178.9651" x="346.1171" y="670.1682"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="106.3568" x="356.1171" y="692.9963">Run / resume suite</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="158.9651" x="356.1171" y="709.3404">executes only pending tasks</text><polygon fill="#FFF7E6" points="352.5173,217.2361,518.6821,217.2361,530.6821,229.2361,518.6821,241.2361,352.5173,241.2361,340.5173,229.2361,352.5173,217.2361" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="439.5997" y="252.995">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="166.1648" x="352.5173" y="233.5041">Dashboard suite augmentation?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="530.6821" y="226.0131">no</text><polygon fill="#FFF7E6" points="435.5997,742.8564,447.5997,754.8564,435.5997,766.8564,423.5997,754.8564,435.5997,742.8564" style="stroke:#555555;stroke-width:0.5;"/><rect fill="#F8F8F8" height="85.3765