,1054.412" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="439.5997" y="1090.171">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="127.3461" x="371.9266" y="1070.68">Any selected ID missing?</text><polygon fill="#FFF7E6" points="376.9096,948.577,494.2898,948.577,506.2898,960.577,494.2898,972.577,376.9096,972.577,364.9096,960.577,376.9096,948.577" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="439.5997" y="984.3359">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="117.3802" x="376.9096" y="964.845">Question IDs selected?</text><polygon fill="#FFF7E6" points="435.5997,1231.575,447.5997,1243.575,435.5997,1255.575,423.5997,1243.575,435.5997,1231.575" style="stroke:#555555;stroke-width:0.5;"/><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="177.6211" x="346.7891" y="1325.066"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="157.6211" x="356.7891" y="1347.8941">Print resolved configuration</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="129.5529" x="356.7891" y="1364.2382">and selected questions</text><ellipse cx="435.5997" cy="1408.7542" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="435.5997" cy="1408.7542" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><polygon fill="#FFF7E6" points="413.6218,1275.575,457.5775,1275.575,469.5775,1287.575,457.5775,1299.575,413.6218,1299.575,401.6218,1287.575,413.6218,1275.575" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="439.5997" y="1311.334">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="43.9557" x="413.6218" y="1291.843">Dry run?</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="207.7533" x="331.723" y="1461.7542"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="187.7533" x="341.723" y="1484.5823">Create unique output JSONL path</text><polygon fill="#FFF7E6" points="327.6849,1518.0983,543.5144,1518.0983,555.5144,1533.0802,543.5144,1548.0621,327.6849,1548.0621,315.6849,1533.0802,327.6849,1518.0983" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="173.2378" x="327.6849" y="1529.8572">System requires corpus isolation?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="215.8295" x="327.6849" y="1544.8391">ACE, Claude Code Local, Codex, ClawCode</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="298.6021" y="1529.8572">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="555.5144" y="1529.8572">no</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="127.1008" x="142.4981" y="1630.0621"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="107.1008" x="152.4981" y="1652.8902">Take next question</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="204.5013" x="103.7978" y="1701.4062"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="184.5013" x="113.7978" y="1724.2343">Copy corpus to tmpfs (/dev/shm)</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="154.1051" x="113.7978