<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="2830px" preserveAspectRatio="none" style="width:782px;height:2830px;background:#FFFFFF;" version="1.1" viewBox="0 0 782 2830" width="782px" zoomAndPan="magnify"><title>Result Processor - Analysis and Reporting Pipeline</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="348.8507" x="215.5256" y="34.9659">Result Processor - Analysis and Reporting Pipeline</text></g><ellipse cx="386.4066" cy="60.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="220.6415" x="276.0858" y="90.0679"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="200.6415" x="286.0858" y="112.896">Select experiment result JSONL files</text><path d="M10,136.412 L10,234.9421 L283.3822,234.9421 L283.3822,146.412 L273.3822,136.412 L10,136.412" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M273.3822,136.412 L273.3822,146.412 L283.3822,146.412 L273.3822,136.412" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="105.2871" x="16" y="155.309">Alternative entry:</text><text fill="#000000" font-family="Arial" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="103.285" x="124.6671" y="155.309">analysis-job run</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="252.3822" x="16" y="173.0151">manages a persistent job with resumable</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="242.2942" x="16" y="190.7211">state tracking, cooperative cancellation,</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="175.1362" x="16" y="208.4271">and optional suite ID linkage</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="206.7652" x="16" y="226.1331">(analysis-job run / status / cancel).</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="214.0894" x="279.3619" y="284.4331"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="163.3572" x="289.3619" y="307.2611">Select augmented suite state</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="194.0894" x="289.3619" y="323.6053">and base analysis output directory</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="226.6895" x="273.0618" y="357.1213"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="206.6895" x="283.0618" y="379.9494">Create new analysis output directory</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="121.2249" x="283.0618" y="396.2935">and analysis job state</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="246.0936" x="263.3598" y="429.8095"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="226.0936" x="273.3598" y="452.6376">Copy matching base analysis JSONL files</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="142.309" x="273.3598" y="468.9817">by source result filename</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="215.3974" x="278.7079" y="502.4977"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="195.3974" x="288.7079" y="525.3258">Build tasks for all augmented suite</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="58.2724" x="288.7079" y="541.6699">result files</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="248.0856" x="262.3638" y="575.186"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="204.6855" x="272.3638" y="598.0141">Resume mode marks copied run IDs</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="228.0856" x="272.3638" y="614.3582">as skipped and leaves new runs pending</text><polygon fill="#FFF7E6" points="295.3822,234.9421,477.4309,234.9421,489.4309,246.9421,477.4309,258.9421,295.3822,258.9421,283.3822,246.9421,295.3822,234.9421" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="390.4066" y="270.701">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="182.0487" x="295.3822" y="251.2101">Dashboard analysis augmentation?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="489.4309" y="243.7191">no</text><polygon fill="#FFF7E6" points="386.4066,647.8742,398.4066,659.8742,386.4066,671.8742,374.4066,659.8742,386.4066,647.8742" style="stroke:#555555;stroke-width:0.5;"/><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="193.4012" x="289.706" y="691.8742"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="170.1732" x="299.706" y="714.7023">Load already analyzed run IDs</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="173.4012" x="299.706" y="731.0464">when resume mode is enabled</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="136.5688" x="318.1222" y="808.5624"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="116.5688" x="328.1222" y="831.3905">Read next RunResult</text><polygon fill="#FFF7E6" points="328.9265,864.9065,443.8867,864.9065,455.8867,876.9065,443.8867,888.9065,328.9265,888.9065,316.9265,876.9065,328.9265,864.9065" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="114.9602" x="328.9265" y="881.1745">Run already analyzed?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="299.8436" y="873.6836">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="455.8867" y="873.6836">no</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="109.3166" x="208.0512" y="898.9065"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="89.3166" x="218.0512" y="921.7346">Skip cached run</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="165.153" x="427.5272" y="898.9065"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="145.153" x="437.5272" y="921.7346">Record analysis start time</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="115.6527" x="452.2774" y="955.2507"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="95.6527" x="462.2774" y="978.0787">Take answer text</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="145.0169" x="437.5952" y="1011.5948"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="125.0169" x="447.5952" y="1034.4229">Strip reasoning blocks</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="172.2091" x="423.9992" y="1067.9389"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="152.2091" x="433.9992" y="1090.767">Extract structured citations</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="151.3571" x="433.9992" y="1107.1111">(statement, file, line range)</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="210.8253" x="404.691" y="1140.6271"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="190.8253" x="414.691" y="1163.4552">Split remaining uncited sentences</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="144.8849" x="437.6612" y="1240.9712"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="122.8449" x="447.6612" y="1263.7993">Resolve cited file path</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="124.8849" x="447.6612" y="1280.1434">inside selected corpus</text><polygon fill="#FFF7E6" points="458.9706,1313.6595,561.2368,1313.6595,573.2368,1325.6595,561.2368,1337.6595,458.9706,1337.6595,446.9706,1325.6595,458.9706,1313.6595" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="102.2662" x="458.9706" y="1329.9274">Reference resolves?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="429.8877" y="1322.4365">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="573.2368" y="1322.4365">no</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="138.7048" x="347.3678" y="1347.6595"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="104.2327" x="357.3678" y="1370.4875">Read cited excerpt</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="118.7048" x="357.3678" y="1386.8317">and clamp line range</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="194.8292" x="506.0726" y="1347.6595"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="174.8292" x="516.0726" y="1370.4875">Mark claim as BAD_REFERENCE</text><polygon fill="#FFF7E6" points="510.1037,1406.3477,522.1037,1418.3477,510.1037,1430.3477,498.1037,1418.3477,510.1037,1406.3477" style="stroke:#555555;stroke-width:0.5;"/><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="173.0371" x="423.5851" y="1499.8386"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="153.0371" x="433.5851" y="1522.6667">Ask examiner LLM whether</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150.3131" x="433.5851" y="1539.0108">excerpt supports the claim</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="217.7134" x="401.247" y="1583.0269"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="197.7134" x="411.247" y="1605.8549">Store claim verdict and justification</text><polygon fill="#FFF7E6" points="464.146,1450.3477,556.0614,1450.3477,568.0614,1462.3477,556.0614,1474.3477,464.146,1474.3477,452.146,1462.3477,464.146,1450.3477" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="514.1037" y="1486.1066">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="91.9154" x="464.146" y="1466.6157">Excerpt available?</text><polygon fill="#FFF7E6" points="510.1037,1639.371,522.1037,1651.371,510.1037,1663.371,498.1037,1651.371,510.1037,1639.371" style="stroke:#555555;stroke-width:0.5;"/><polygon fill="#FFF7E6" points="510.1037,1196.9712,522.1037,1208.9712,510.1037,1220.9712,498.1037,1208.9712,510.1037,1196.9712" style="stroke:#555555;stroke-width:0.5;"/><polygon fill="#FFF7E6" points="470.702,1683.371,549.5054,1683.371,561.5054,1695.371,549.5054,1707.371,470.702,1707.371,458.702,1695.371,470.702,1683.371" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="78.8035" x="470.702" y="1699.6389">More citations?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="561.5054" y="1692.148">yes</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="148.3649" x="435.9212" y="1771.371"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="128.3649" x="445.9212" y="1794.1991">Mark uncited sentence</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="109.7048" x="445.9212" y="1810.5432">as BAD_REFERENCE</text><polygon fill="#FFF7E6" points="510.1037,1727.371,522.1037,1739.371,510.1037,1751.371,498.1037,1739.371,510.1037,1727.371" style="stroke:#555555;stroke-width:0.5;"/><polygon fill="#FFF7E6" points="445.8422,1844.0592,574.3652,1844.0592,586.3652,1856.0592,574.3652,1868.0592,445.8422,1868.0592,433.8422,1856.0592,445.8422,1844.0592" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="128.5231" x="445.8422" y="1860.3272">More uncited sentences?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="586.3652" y="1852.8362">yes</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="195.9093" x="412.1491" y="1888.0592"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="175.9093" x="422.1491" y="1910.8873">Summarize answer helpfulness</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="130.813" x="422.1491" y="1927.2314">from per-claim verdicts</text><rect fill="#F8F8F8" height="69.0323" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="165.2491" x="427.4792" y="1960.7474"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="136.081" x="437.4792" y="1983.5755">Aggregate support rate,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="145.2491" x="437.4792" y="1999.9196">error rate, overclaim rate,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="140.869" x="437.4792" y="2016.2637">and final pass/fail verdict</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="199.4973" x="410.3551" y="2049.7798"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="129.2169" x="420.3551" y="2072.6079">Record analysis_time_s</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="179.4973" x="420.3551" y="2088.952">(wall-clock duration for this run)</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="184.6171" x="417.7951" y="2122.468"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="156.9011" x="427.7951" y="2145.2961">Attach suite_id, suite_name,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust=