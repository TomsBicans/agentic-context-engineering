<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="1531px" preserveAspectRatio="none" style="width:881px;height:1531px;background:#FFFFFF;" version="1.1" viewBox="0 0 881 1531" width="881px" zoomAndPan="magnify"><title>Software Development Process Using CLI Coding Agents</title><defs/><g><g class="title" data-source-line="1"><text fill="#000000" font-family="Arial" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="391.9005" x="243.2269" y="34.9659">Software Development Process Using CLI Coding Agents</text></g><rect fill="#EEEEEE" height="49.0317" style="stroke:#EEEEEE;stroke-width:1;" width="848.3543" x="15" y="53.8419"/><ellipse cx="147.3168" cy="117.8736" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1;"/><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="188.4692" x="53.0822" y="147.8736"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="168.4692" x="63.0822" y="170.7017">Identify required functionality</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="134.905" x="63.0822" y="187.0458">or system improvement</text><path d="M293.6336,293.9556 L293.6336,321.5146 L273.6336,325.5146 L293.6336,329.5146 L293.6336,357.0736 A0,0 0 0 0 293.6336,357.0736 L555.6799,357.0736 A0,0 0 0 0 555.6799,357.0736 L555.6799,303.9556 L545.6799,293.9556 L293.6336,293.9556 A0,0 0 0 0 293.6336,293.9556" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M545.6799,293.9556 L545.6799,303.9556 L555.6799,303.9556 L545.6799,293.9556" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="232.9992" x="299.6336" y="312.8526">Inspired by ADR practice &#8212; decision is</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="214.8512" x="299.6336" y="330.5586">carefully reasoned but not formally</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="241.0462" x="299.6336" y="348.2646">documented; kept in the author's head.</text><rect fill="#F8F8F8" height="69.0323" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="252.6336" x="21" y="290.9984"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="232.6336" x="31" y="313.8265">Evaluate architectural trade-offs mentally</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="220.0456" x="31" y="330.1706">(impact on future work, library choices,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="105.5647" x="31" y="346.5147">package structure)</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="184.0892" x="55.2722" y="384.1223"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="164.0892" x="65.2722" y="406.9504">Implement architectural step</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="121.0569" x="65.2722" y="423.2945">with full author effort</text><polygon fill="#FFF7E6" points="66.6874,220.5618,227.9462,220.5618,239.9462,243.0346,227.9462,265.5075,66.6874,265.5075,54.6874,243.0346,66.6874,220.5618" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="17.0829" x="151.3168" y="277.2664">yes</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="161.2589" x="66.6874" y="232.3207">Architecture decision required?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="145.716" x="66.6874" y="247.3026">new package, library choice,</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="124.4091" x="66.6874" y="262.2845">major structural change</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="239.9462" y="239.8117">no</text><polygon fill="#FFF7E6" points="147.3168,456.8105,159.3168,468.8105,147.3168,480.8105,135.3168,468.8105,147.3168,456.8105" style="stroke:#555555;stroke-width:0.5;"/><path d="M293.4116,494.9146 L293.4116,531.3267 L273.4116,535.3267 L293.4116,539.3267 L293.4116,575.7387 A0,0 0 0 0 293.4116,575.7387 L554.6909,575.7387 A0,0 0 0 0 554.6909,575.7387 L554.6909,504.9146 L544.6909,494.9146 L293.4116,494.9146 A0,0 0 0 0 293.4116,494.9146" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M544.6909,494.9146 L544.6909,504.9146 L554.6909,504.9146 L544.6909,494.9146" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="224.4582" x="299.4116" y="513.8117">Key bottleneck: translating a precise,</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="240.2792" x="299.4116" y="531.5177">context-rich idea into a written prompt.</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="236.4572" x="299.4116" y="549.2237">Voice-to-text (local speech recognition)</text><text fill="#000000" font-family="Arial" font-size="13" lengthAdjust="spacing" textLength="170.1832" x="299.4116" y="566.9297">used to accelerate this step.</text><rect fill="#F8F8F8" height="69.0323" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="252.1896" x="21.222" y="500.8105"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="232.1896" x="31.222" y="523.6386">Formulate idea with full technical context</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="200.6895" x="31.222" y="539.9827">(task description, affected modules,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="184.4773" x="31.222" y="556.3268">expected behaviour, constraints)</text><rect fill="#F8F8F8" height="69.0323" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="245.6016" x="24.516" y="595.7387"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="129.5049" x="34.516" y="618.5668">Write prompt &#8212; attach</text><text fill="#000000" font-family="Arial" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="29.8202" x="167.141" y="618.5668">@file</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="60.0365" x="200.0812" y="618.5668">references</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="203.3175" x="34.516" y="634.9109">for relevant source files and provide</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="185.9173" x="34.516" y="651.255">additional context where needed</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="170.4691" x="62.0823" y="1194.2284"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="134.749" x="72.0823" y="1217.0565">Review generated code,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="150.4691" x="72.0823" y="1233.4006">test results, and behaviour</text><polygon fill="#FFF7E6" points="147.3168,684.7711,159.3168,696.7711,147.3168,708.7711,135.3168,696.7711,147.3168,684.7711" style="stroke:#555555;stroke-width:0.5;"/><polygon fill="#FFF7E6" points="99.7146,1266.9166,194.919,1266.9166,206.919,1278.9166,194.919,1290.9166,99.7146,1290.9166,87.7146,1278.9166,99.7146,1266.9166" style="stroke:#555555;stroke-width:0.5;"/><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="95.2043" x="99.7146" y="1283.1846">Result acceptable?</text><text fill="#000000" font-family="Arial" font-size="11" lengthAdjust="spacing" textLength="13.4529" x="206.919" y="1275.6936">no</text><rect fill="#F8F8F8" height="69.0323" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="185.9252" x="302.9917" y="949.8196"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="139.321" x="312.9917" y="972.6477">Adjust prompt &#8212; correct</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="165.9252" x="312.9917" y="988.9918">misunderstood requirements</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="128.9889" x="312.9917" y="1005.3359">or add missing context</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="178.6651" x="57.9843" y="1310.9166"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="158.6651" x="67.9843" y="1333.7447">Accept and commit changes</text><ellipse cx="147.3168" cy="1378.2607" fill="none" rx="11" ry="11" style="stroke:#222222;stroke-width:1;"/><ellipse cx="147.3168" cy="1378.2607" fill="#222222" rx="6" ry="6" style="stroke:#222222;stroke-width:1;"/><line style="stroke:#555555;stroke-width:1.5;" x1="15" x2="15" y1="53.8419" y2="1389.2607"/><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="263.3498" x="592.6722" y="728.7711"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="243.3498" x="602.6722" y="751.5991">Receive prompt and referenced file context</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="126.9928" x="660.8507" y="785.1152"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="99.3967" x="670.8507" y="807.9433">Explore codebase</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="106.9928" x="670.8507" y="824.2874">(grep, ls, read files)</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="194.4932" x="627.1005" y="857.8034"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="174.4932" x="637.1005" y="880.6315">Plan implementation approach</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="216.2254" x="616.2344" y="914.1475"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="196.2254" x="626.2344" y="936.9756">Implement requested functionality</text><rect fill="#F8F8F8" height="36.3441" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="105.7406" x="671.4768" y="985.4916"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="85.7406" x="681.4768" y="1008.3197">Write unit tests</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="180.0691" x="634.3125" y="1048.8519"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="139.165" x="644.3125" y="1071.68">Execute shell commands</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="160.0691" x="644.3125" y="1088.0241">(run tests, lint, verify output)</text><rect fill="#F8F8F8" height="52.6882" rx="12.5" ry="12.5" style="stroke:#555555;stroke-width:0.5;" width="192.7532" x="627.9705" y="1121.5401"/><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="172.7532" x="637.9705" y="1144.3682">Return result &#8212; code changes,</text><text fill="#000000" font-family="Arial" font-size="12" lengthAdjust="spacing" textLength="146.833" x="637.9705" y="1160.7123">test output, and summary</text><line style="stroke:#555555;stroke-width:1.5;" x1="584.6799" x2="584.6799" y1="53.8419" y2="1389.2607"/><line style="stroke:#555555;stroke-width:1.5;" x1="862.0143" x2="862.0143" y1="53.8419" y2="1389.2607"/><line style="stroke:#181818;stroke-width:1;" x1="147.3168" x2="147.3168" y1="127.8736" y2="147.8736"/><polygon fill="#181818" points="143.3168,137.8736,147.3168,147.8736,151.3168,137.8736,147.3168,141.8736" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="147.3168" x2="147.3168" y1="360.0308" y2="384.1223"/><polygon fill="#181818" points="143.3168,374.1223,147.3168,384.1223,151.3168,374.1223,147.3168,378.1223" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="147.3168" x2="147.3168" y1="265.5075" y2="290.9984"/><polygon fill="#181818" points="143.3168,280.9984,147.3168,290.9984,151.3168,280.9984,147.3168,284.9984" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="239.9462" x2="565.6799" y1="243.0346" y2="243.0346"/><polygon fill="#181818" points="561.6799,354.1223,565.6799,364.1223,569.6799,354.1223,565.6799,358.1223" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="565.6799" x2="565.6799" y1="243.0346" y2="468.8105"/><line style="stroke:#181818;stroke-width:1;" x1="565.6799" x2="159.3168" y1="468.8105" y2="468.8105"/><polygon fill="#181818" points="169.3168,464.8105,159.3168,468.8105,169.3168,472.8105,165.3168,468.8105" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="147.3168" x2="147.3168" y1="436.8105" y2="456.8105"/><polygon fill="#181818" points="143.3168,446.8105,147.3168,456.8105,151.3168,446.8105,147.3168,450.8105" style="stroke:#181818;stroke-width:1;"/><line style="s